name: Apply Analytics Payload

on:
  push:
    branches:
      - agent/analytics-executive-intelligence
    paths:
      - '.analytics-payload/**'
      - '.github/workflows/apply-analytics-payload.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/analytics-executive-intelligence
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - name: Decode analytics bounded context
        shell: bash
        run: |
          set -euo pipefail
          cat .analytics-payload/part-* | base64 -d > /tmp/analytics-payload.tgz
          tar -xzf /tmp/analytics-payload.tgz -C .
          find src tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          node --check assets/admin/analytics.js
      - name: Commit generated bounded context
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md rishe.php src assets/admin/analytics.css assets/admin/analytics.js tests/Analytics docs/analytics.md docs/prd-gap-analysis.md
          if git diff --cached --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git commit -m 'Add analytics and executive intelligence'
          git push origin HEAD:agent/analytics-executive-intelligence
