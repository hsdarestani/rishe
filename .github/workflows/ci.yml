name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - name: Syntax check
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Shell syntax check
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Coding standards
        id: phpcs
        shell: bash
        run: |
          set +e
          vendor/bin/phpcs -n --standard=phpcs.xml.dist --report=full | tee phpcs-report.txt
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload coding standards report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-report-php-${{ matrix.php }}
          path: phpcs-report.txt
      - name: Tests
        run: composer test
      - name: Enforce coding standards
        if: steps.phpcs.outputs.status != '0'
        run: exit 1
