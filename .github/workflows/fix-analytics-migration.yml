name: Fix Analytics Migration

on:
  push:
    branches:
      - agent/analytics-executive-intelligence
    paths:
      - '.github/workflows/fix-analytics-migration.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/analytics-executive-intelligence
          fetch-depth: 0
      - name: Rename reserved index identifiers and clean diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('src/Infrastructure/Database/Migrations/CreateAnalyticsTables.php')
          source = path.read_text()
          source = source.replace('KEY year_month (year_number, month_number)', 'KEY idx_year_month (year_number, month_number)')
          source = source.replace('KEY quarter (year_number, quarter_number)', 'KEY idx_year_quarter (year_number, quarter_number)')
          source = source.replace('KEY month_key (month_key)', 'KEY idx_month_key (month_key)')
          path.write_text(source)
          PY
          git fetch origin main
          git checkout origin/main -- .github/workflows/integration.yml
          git rm -f .github/workflows/debug-analytics-activation.yml
          git rm -f .github/workflows/fix-analytics-migration.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/Infrastructure/Database/Migrations/CreateAnalyticsTables.php .github/workflows/integration.yml
          git commit -m 'Fix analytics time dimension migration'
          git push origin HEAD:agent/analytics-executive-intelligence
