name: Fix Analytics Style

on:
  push:
    branches:
      - agent/analytics-executive-intelligence
    paths:
      - '.github/workflows/fix-analytics-style.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/analytics-executive-intelligence
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - name: Apply PSR fixes and split test fakes
        shell: bash
        run: |
          set -euo pipefail
          vendor/bin/phpcbf -n --standard=phpcs.xml.dist src/Infrastructure/Database/Migrations/CreateAnalyticsTables.php || true
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/Analytics/AnalyticsServiceTest.php')
          source = path.read_text()
          marker = '\nfinal class ImmediateTransactions implements TransactionRunner\n'
          index = source.index(marker)
          main = source[:index].rstrip() + '\n'
          main = main.replace('use Rishe\\Analytics\\Application\\AnalyticsRepository;\n', '')
          main = main.replace('use Rishe\\Shared\\Audit\\AuditRecorder;\n', '')
          main = main.replace('use Rishe\\Shared\\Database\\TransactionRunner;\n', '')
          path.write_text(main)
          fake_dir = Path('tests/Analytics/Fakes')
          fake_dir.mkdir(parents=True, exist_ok=True)
          (fake_dir / 'ImmediateTransactions.php').write_text('''<?php

          declare(strict_types=1);

          namespace Rishe\\Tests\\Analytics;

          use Rishe\\Shared\\Database\\TransactionRunner;

          final class ImmediateTransactions implements TransactionRunner
          {
              public function run(callable $operation): mixed
              {
                  return $operation();
              }
          }
          ''')
          (fake_dir / 'FakeAuditRecorder.php').write_text('''<?php

          declare(strict_types=1);

          namespace Rishe\\Tests\\Analytics;

          use Rishe\\Shared\\Audit\\AuditRecorder;

          final class FakeAuditRecorder implements AuditRecorder
          {
              public function record(
                  string $eventType,
                  string $aggregateType,
                  string $aggregateId,
                  array $payload = [],
                  ?string $correlationId = null
              ): string {
                  return $eventType . ':' . $aggregateType . ':' . $aggregateId;
              }
          }
          ''')
          repository_start = source.index('final class FakeAnalyticsRepository implements AnalyticsRepository')
          repository_class = source[repository_start:].strip() + '\n'
          (fake_dir / 'FakeAnalyticsRepository.php').write_text('''<?php

          declare(strict_types=1);

          namespace Rishe\\Tests\\Analytics;

          use Rishe\\Analytics\\Application\\AnalyticsRepository;

          ''' + repository_class)
          PY
          find tests/Analytics src/Infrastructure/Database/Migrations/CreateAnalyticsTables.php -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          vendor/bin/phpcs -n --standard=phpcs.xml.dist src/Infrastructure/Database/Migrations/CreateAnalyticsTables.php tests/Analytics
      - name: Commit style fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/Infrastructure/Database/Migrations/CreateAnalyticsTables.php tests/Analytics
          git commit -m 'Fix analytics coding standards'
          git push origin HEAD:agent/analytics-executive-intelligence
